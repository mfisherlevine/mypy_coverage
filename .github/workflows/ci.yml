name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Lint / format / mypy (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -ra --cov=mypy_coverage --cov-report=xml --cov-report=term --cov-branch
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: py${{ matrix.python-version }}

  self-coverage:
    name: Self-coverage (must be 100%)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Coverage annotations (inline on PR diff)
        run: mypy-coverage --color never --format github
      - name: Build coverage markdown
        run: |
          {
            echo "<!-- mypy-coverage-report -->"
            mypy-coverage --color never --format markdown
          } > "$RUNNER_TEMP/mypy-coverage.md"
      - name: Step summary
        run: cat "$RUNNER_TEMP/mypy-coverage.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Find existing PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- mypy-coverage-report -->
      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ runner.temp }}/mypy-coverage.md
          edit-mode: replace
      - name: Coverage gate
        run: mypy-coverage --color never --threshold 100

  action-smoke-test:
    name: Composite action smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: mc
        uses: ./
        with:
          paths: src/mypy_coverage
          format: text
          threshold: "100"
          threshold-metric: fully-typed
      - name: Outputs are populated
        shell: bash
        run: |
          set -euo pipefail
          echo "percent-checked     = ${{ steps.mc.outputs.percent-checked }}"
          echo "percent-fully-typed = ${{ steps.mc.outputs.percent-fully-typed }}"
          echo "unannotated         = ${{ steps.mc.outputs.unannotated }}"
          echo "partial             = ${{ steps.mc.outputs.partial }}"
          echo "total               = ${{ steps.mc.outputs.total }}"
          # The package dogfoods to 100%, so this is a load-bearing assertion.
          test "${{ steps.mc.outputs.percent-fully-typed }}" = "100.0"
          test "${{ steps.mc.outputs.unannotated }}" = "0"
          test "${{ steps.mc.outputs.partial }}" = "0"
