name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Verify built version matches tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          # The wheel filename embeds the version: mypy_coverage-X.Y.Z-py3-none-any.whl
          wheel=$(ls dist/*.whl)
          case "$wheel" in
            *"-${tag}-"*) echo "OK: $wheel matches tag v${tag}" ;;
            *) echo "Tag v${tag} does not match built wheel: $wheel" >&2; exit 1 ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mypy-coverage
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
